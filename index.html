<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rprtx — Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>

    <style>
        :root { --bg: #050505; --indigo: #6366f1; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Menu Titik 3 */
        .dot-menu { position: fixed; top: 30px; right: 40px; z-index: 1000; cursor: pointer; font-size: 24px; letter-spacing: 2px; color: #fff; transition: 0.3s; }
        .dot-menu:hover { color: var(--indigo); letter-spacing: 5px; }

        .overlay { position: fixed; inset: 0; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); z-index: 999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.5s; }
        .overlay.active { opacity: 1; pointer-events: all; }
        .nav-link { font-size: 5vw; font-weight: 900; text-transform: uppercase; text-decoration: none; color: white; }

        /* Container Lurus ke Samping */
        .scroll-container { display: flex; flex-wrap: nowrap; width: 500vw; height: 100vh; }
        .panel { flex-shrink: 0; width: 100vw; height: 100vh; display: flex; align-items: center; padding: 0 5vw; border-right: 1px solid rgba(255,255,255,0.05); position: relative; }
        
        /* Teks Lurus Menyamping */
        .panel__title { font-size: 12vw; font-weight: 900; text-transform: uppercase; white-space: nowrap; line-height: 1; letter-spacing: -0.05em; }

        /* Foto Beterbangan */
        .floating-img { position: absolute; width: 250px; height: 350px; object-fit: cover; border-radius: 10px; pointer-events: none; z-index: 10; filter: grayscale(100%); opacity: 0.7; }

        .char { display: inline-block; transform: translateY(100%); opacity: 0; }
    </style>
</head>
<body>

    <div class="dot-menu" onclick="toggleMenu()">•••</div>
    <nav class="overlay"><a href="about.html" class="nav-link">About</a></nav>

    <main class="scroll-container">
        <img src="https://picsum.photos/400/600?random=1" class="floating-img" style="top: 10%; left: 120%;">
        <img src="https://picsum.photos/400/600?random=2" class="floating-img" style="bottom: 15%; left: 250%;">
        <img src="https://picsum.photos/400/600?random=3" class="floating-img" style="top: 20%; left: 380%;">

        <section class="panel"><h1 class="panel__title text-indigo-500 animate">System Init</h1></section>
        <section class="panel bg-[#080808]"><h1 class="panel__title animate">Creative Archive</h1></section>
        <section class="panel"><h1 class="panel__title animate" style="-webkit-text-stroke: 1px white; color: transparent;">Future Lab</h1></section>
        <section class="panel bg-[#060606]"><h1 class="panel__title animate">Visual Flow</h1></section>
        <section class="panel bg-indigo-600"><h1 class="panel__title text-black animate">Stay Stoic</h1></section>
    </main>

    <script>
        const toggleMenu = () => document.querySelector('.overlay').classList.toggle('active');

        gsap.registerPlugin(ScrollTrigger);
        const panels = gsap.utils.toArray(".panel");
        
        const scrollTween = gsap.to(panels, {
            xPercent: -100 * (panels.length - 1),
            ease: "none",
            scrollTrigger: { trigger: ".scroll-container", pin: true, scrub: 1, end: () => "+=" + innerWidth * 5 }
        });

        // Animasi Teks & Foto Beterbangan
        document.querySelectorAll(".animate").forEach(el => {
            new SplitType(el, { types: 'chars' });
            gsap.fromTo(el.querySelectorAll(".char"), { y: 100, opacity: 0 }, {
                y: 0, opacity: 1, stagger: 0.05, scrollTrigger: { trigger: el, containerAnimation: scrollTween, start: "left 80%", toggleActions: "play none none reverse" }
            });
        });

        gsap.utils.toArray(".floating-img").forEach(img => {
            gsap.to(img, {
                y: -100, rotation: 10, scrollTrigger: { trigger: img, containerAnimation: scrollTween, scrub: 2 }
            });
        });

        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
    </script>
</body>
</html>
