<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rprtx — Digital Archive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --accent-indigo: #6366f1;
            --panel-border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --font-mono: 'Fira Code', monospace;
        }

        /* 1. RESET & BASE */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
        }

        html.lenis { height: auto; }
        .lenis-smooth { scroll-behavior: auto !important; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* 2. LAYOUT ARCHITECTURE */
        #main-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .horizontal-container {
            display: flex;
            width: 400vw; /* Total panels * 100vw */
            height: 100vh;
            will-change: transform;
        }

        .panel {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8vw;
            border-right: 1px solid var(--panel-border);
        }

        .panel-title {
            font-size: clamp(3rem, 12vw, 15rem);
            font-weight: 900;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        .panel-number {
            position: absolute;
            top: 10%;
            left: 8vw;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: #444;
            text-transform: uppercase;
        }

        /* 3. TYPOGRAPHY ENGINE STYLES */
        .char {
            display: inline-block;
            transform: translateY(100%);
            opacity: 0;
            will-change: transform, opacity;
        }

        .text-stroke {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            color: transparent;
        }

        /* Utility: Custom Selection */
        ::selection {
            background: var(--accent-indigo);
            color: white;
        }
    </style>
</head>
<body>

    <main id="main-wrapper">
        <div class="horizontal-container">
            
            <section class="panel">
                <span class="panel-number">01 // INIT</span>
                <h1 class="panel-title text-indigo-500 animate-text">System<br>Init</h1>
            </section>

            <section class="panel bg-[#080808]">
                <span class="panel-number">02 // ARCH</span>
                <h1 class="panel-title animate-text">Core<br>Engine</h1>
            </section>

            <section class="panel">
                <span class="panel-number">03 // FLOW</span>
                <h1 class="panel-title text-stroke animate-text">Smooth<br>Motion</h1>
            </section>

            <section class="panel bg-[#6366f1]">
                <span class="panel-number" style="color: rgba(0,0,0,0.4)">04 // END</span>
                <h1 class="panel-title text-black animate-text">Stay<br>Stoic</h1>
            </section>

        </div>
    </main>

    <script>
        /**
         * RPRTX - CORE ENGINE
         * Integrated: Lenis + GSAP + SplitType
         */
        
        const RPRTX_Engine = {
            init() {
                this.initLenis();
                this.initScrollArchitecture();
                this.initTypography();
                this.handleResize();
                
                console.log("System Status: v1.3 - All Systems Nominal.");
            },

            // --- STEP 1: SMOOTH SCROLL (LENIS) ---
            initLenis() {
                this.lenis = new Lenis({
                    duration: 1.5,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                    smoothWheel: true,
                    wheelMultiplier: 1,
                });

                // Sync Lenis with GSAP ScrollTrigger
                this.lenis.on('scroll', ScrollTrigger.update);

                gsap.ticker.add((time) => {
                    this.lenis.raf(time * 1000);
                });
                
                gsap.ticker.lagSmoothing(0);
            },

            // --- STEP 2: HORIZONTAL SCROLL (GSAP) ---
            initScrollArchitecture() {
                gsap.registerPlugin(ScrollTrigger);

                const container = document.querySelector(".horizontal-container");
                const sections = gsap.utils.toArray(".panel");

                // Kita simpan tween ini ke dalam properti agar bisa diakses oleh Typography Engine
                this.horizontalTween = gsap.to(sections, {
                    xPercent: -100 * (sections.length - 1),
                    ease: "none",
                    scrollTrigger: {
                        trigger: "#main-wrapper",
                        pin: true,
                        scrub: 1,
                        snap: 1 / (sections.length - 1),
                        start: "top top",
                        end: () => "+=" + container.offsetWidth,
                        invalidateOnRefresh: true
                    }
                });
            },

            // --- STEP 3: TYPOGRAPHY ENGINE (SPLIT-TEXT) ---
            initTypography() {
                const textTargets = document.querySelectorAll(".animate-text");

                textTargets.forEach((target) => {
                    // Pecah teks menjadi karakter individu
                    const split = new SplitType(target, { types: 'chars' });

                    // Animasi Karakter
                    gsap.fromTo(split.chars, 
                        { 
                            y: 100, 
                            opacity: 0 
                        }, 
                        {
                            y: 0,
                            opacity: 1,
                            stagger: 0.05,
                            duration: 1.2,
                            ease: "power4.out",
                            scrollTrigger: {
                                trigger: target,
                                containerAnimation: this.horizontalTween, // Link ke horizontal scroll
                                start: "left 85%",
                                toggleActions: "play none none reverse"
                            }
                        }
                    );
                });
            },

            // --- UTILITY: REFRESH ON RESIZE ---
            handleResize() {
                window.addEventListener("resize", () => {
                    ScrollTrigger.refresh();
                });
            }
        };

        // RUN SYSTEM ON LOAD
        document.addEventListener("DOMContentLoaded", () => {
            RPRTX_Engine.init();
        });
    </script>
</body>
</html>
