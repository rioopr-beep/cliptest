<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rprtx — Creative Archive</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <button class="nav-trigger" onclick="toggleNav()">•••</button>

    <nav class="overlay">
        <a href="about.html" class="nav-link">About</a>
    </nav>

    <main class="scroll-wrapper">
        <div class="scroll-content">
            
            <img src="https://picsum.photos/600/800?random=1" class="floating-photo" style="top: 15%; left: 120vw;">
            <img src="https://picsum.photos/600/800?random=2" class="floating-photo" style="bottom: 10%; left: 240vw;">
            <img src="https://picsum.photos/600/800?random=3" class="floating-photo" style="top: 20%; left: 360vw;">
            <img src="https://picsum.photos/600/800?random=4" class="floating-photo" style="bottom: 15%; left: 450vw;">

            <section class="panel">
                <h1 class="panel-title text-indigo-500 animate">System Init</h1>
            </section>
            
            <section class="panel bg-[#080808]">
                <h1 class="panel-title animate">Creative Archive</h1>
            </section>
            
            <section class="panel">
                <h1 class="panel-title stroke-text animate">Future Lab</h1>
            </section>
            
            <section class="panel bg-[#060606]">
                <h1 class="panel-title animate">Visual Flow</h1>
            </section>
            
            <section class="panel bg-indigo-600">
                <h1 class="panel-title text-black animate">Stay Stoic</h1>
            </section>

        </div>
    </main>

    <script>
        /**
         * RPRTX MASTER ENGINE
         * Mengelola Interaksi Global
         */
        
        const toggleNav = () => document.querySelector('.overlay').classList.toggle('active');

        const Engine = {
            init() {
                this.setupCursor();
                this.setupLenis();
                this.setupScroll();
                this.setupAnimations();
                this.handleResize();
            },

            setupCursor() {
                const c = document.querySelector(".cursor");
                const f = document.querySelector(".cursor-follower");
                window.addEventListener("mousemove", (e) => {
                    gsap.to(c, { x: e.clientX, y: e.clientY, duration: 0 });
                    gsap.to(f, { x: e.clientX - 11, y: e.clientY - 11, duration: 0.15 });
                });
            },

            setupLenis() {
                this.lenis = new Lenis({ 
                    duration: 1.2,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
                });
                gsap.ticker.add((time) => this.lenis.raf(time * 1000));
            },

            setupScroll() {
                gsap.registerPlugin(ScrollTrigger);
                const content = document.querySelector(".scroll-content");
                const panels = gsap.utils.toArray(".panel");
                
                this.masterTween = gsap.to(panels, {
                    xPercent: -100 * (panels.length - 1),
                    ease: "none",
                    scrollTrigger: {
                        trigger: ".scroll-wrapper",
                        pin: true,
                        scrub: 1,
                        end: () => "+=" + content.offsetWidth
                    }
                });
            },

            setupAnimations() {
                // Entrance Text Animation
                document.querySelectorAll(".animate").forEach(el => {
                    const split = new SplitType(el, { types: 'chars' });
                    gsap.fromTo(split.chars, 
                        { y: 150, opacity: 0 }, 
                        {
                            y: 0, opacity: 1, stagger: 0.04, duration: 1, ease: "power4.out",
                            scrollTrigger: {
                                trigger: el,
                                containerAnimation: this.masterTween,
                                start: "left 85%",
                                toggleActions: "play none none reverse"
                            }
                        }
                    );
                });

                // Floating Photo Parallax
                gsap.utils.toArray(".floating-photo").forEach(img => {
                    gsap.to(img, {
                        x: -500,
                        rotation: 15,
                        scrollTrigger: {
                            trigger: img,
                            containerAnimation: this.masterTween,
                            scrub: 1.2
                        }
                    });
                });
            },

            handleResize() {
                window.addEventListener("resize", () => ScrollTrigger.refresh());
            }
        };

        // Launch on Load
        window.onload = () => Engine.init();
    </script>
</body>
</html>
