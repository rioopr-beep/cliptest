<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rprtx — Creative Archive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>

    <style>
        :root {
            --bg: #050505;
            --primary: #6366f1;
            --text: #ffffff;
            --font-main: 'Inter', system-ui, sans-serif;
            --transition-smooth: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main); 
            overflow-x: hidden; 
        }

        /* --- Minimalist Menu Trigger --- */
        .nav-trigger {
            position: fixed; top: 30px; right: 40px;
            z-index: 1000; display: flex; gap: 6px;
            padding: 15px; cursor: pointer;
        }
        .nav-trigger span { width: 5px; height: 5px; background: var(--text); border-radius: 50%; }

        /* --- Glassmorphism Menu Overlay --- */
        .nav-overlay {
            position: fixed; inset: 0; width: 100%; height: 100vh;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(15px);
            z-index: 999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: var(--transition-smooth);
        }
        .nav-overlay.is-open { opacity: 1; pointer-events: all; }
        
        .nav-link {
            font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 900;
            text-decoration: none; color: rgba(255,255,255,0.1);
            text-transform: uppercase; margin: 5px 0;
            transition: var(--transition-smooth);
        }
        .nav-link:hover { color: var(--text); transform: scale(1.05); }

        /* --- Horizontal Architecture --- */
        .scroll-wrapper { position: relative; width: 100%; overflow: hidden; }
        .scroll-container { display: flex; width: 500vw; height: 100vh; flex-wrap: nowrap; }
        
        .panel {
            flex-shrink: 0; /* PENTING: Mencegah panel menumpuk ke bawah */
            position: relative; width: 100vw; height: 100vh;
            display: flex; align-items: center; padding: 0 10%;
            border-right: 1px solid rgba(255,255,255,0.03);
        }
        .panel__title {
            font-size: clamp(3rem, 15vw, 15rem);
            font-weight: 900; line-height: 0.8;
            letter-spacing: -0.05em; text-transform: uppercase;
        }

        .char { display: inline-block; transform: translateY(100%); opacity: 0; }
        .stroke { -webkit-text-stroke: 1px rgba(255,255,255,0.2); color: transparent; }
    </style>
</head>
<body>

    <div class="nav-trigger" onclick="toggleNav()">
        <span></span><span></span><span></span>
    </div>

    <nav class="nav-overlay">
        <a href="index.html" class="nav-link">Index</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="#" class="nav-link">Archive</a>
        <a href="mailto:riokmxl@gmail.com" class="nav-link">Contact</a>
    </nav>

    <main class="scroll-wrapper">
        <div class="scroll-container">
            <section class="panel"><h1 class="panel__title text-indigo-500 animate">System<br>Init</h1></section>
            <section class="panel bg-[#080808]"><h1 class="panel__title animate">About<br>RPRTX</h1></section>
            <section class="panel"><h1 class="panel__title stroke animate">Future<br>Work</h1></section>
            <section class="panel bg-[#060606]"><h1 class="panel__title animate">Visual<br>Flow</h1></section>
            <section class="panel bg-indigo-600"><h1 class="panel__title text-black animate">Stay<br>Stoic</h1></section>
        </div>
    </main>

    <script>
        const toggleNav = () => document.querySelector('.nav-overlay').classList.toggle('is-open');

        const Engine = {
            init() {
                this.setupLenis();
                this.setupScroll();
                this.setupType();
            },
            setupLenis() {
                this.lenis = new Lenis({ duration: 1.2 });
                gsap.ticker.add((time) => this.lenis.raf(time * 1000));
            },
            setupScroll() {
                gsap.registerPlugin(ScrollTrigger);
                const panels = gsap.utils.toArray(".panel");
                this.masterTween = gsap.to(panels, {
                    xPercent: -100 * (panels.length - 1),
                    ease: "none",
                    scrollTrigger: {
                        trigger: ".scroll-wrapper",
                        pin: true,
                        scrub: 1,
                        end: () => "+=" + document.querySelector(".scroll-container").offsetWidth
                    }
                });
            },
            setupType() {
                document.querySelectorAll(".animate").forEach(el => {
                    const split = new SplitType(el, { types: 'chars' });
                    gsap.fromTo(split.chars, { y: 70, opacity: 0 }, {
                        y: 0, opacity: 1, stagger: 0.03, duration: 1,
                        scrollTrigger: {
                            trigger: el, containerAnimation: this.masterTween,
                            start: "left 85%", toggleActions: "play none none reverse"
                        }
                    });
                });
            }
        };
        window.onload = () => Engine.init();
    </script>
</body>
</html>
