<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rprtx — Digital Archive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --accent-indigo: #6366f1;
            --panel-border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --font-mono: 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* Lenis Required CSS */
        html.lenis { height: auto; }
        .lenis-smooth { scroll-behavior: auto !important; }

        /* Scroller Layout */
        #main-scroller {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .horizontal-wrapper {
            display: flex;
            width: 400vw; /* Total panels * 100vw */
            height: 100vh;
            will-change: transform;
        }

        .panel {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 7%;
            border-right: 1px solid var(--panel-border);
        }

        .panel-heading {
            font-size: clamp(3.5rem, 15vw, 18rem);
            font-weight: 800;
            line-height: 0.8;
            letter-spacing: -0.06em;
            text-transform: uppercase;
        }

        .panel-meta {
            position: absolute;
            top: 4rem;
            left: 7%;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: #444;
            text-transform: uppercase;
        }

        /* Utility: Stroke Text */
        .text-stroke {
            -webkit-text-stroke: 1px rgba(255,255,255,0.3);
            color: transparent;
        }
    </style>
</head>
<body>

    <main id="main-scroller">
        <div class="horizontal-wrapper">
            
            <section class="panel">
                <span class="panel-meta">01 / initialization</span>
                <h2 class="panel-heading text-indigo-600">Digital<br>System</h2>
            </section>

            <section class="panel bg-[#070707]">
                <span class="panel-meta">02 / architecture</span>
                <h2 class="panel-heading">Kinetic<br>Motion</h2>
            </section>

            <section class="panel">
                <span class="panel-meta">03 / workflow</span>
                <h2 class="panel-heading text-stroke">Smooth<br>Experience</h2>
            </section>

            <section class="panel bg-[#6366f1]">
                <span class="panel-meta" style="color: rgba(0,0,0,0.4)">04 / conclusion</span>
                <h2 class="panel-heading text-black">Stay<br>Disciplined</h2>
            </section>

        </div>
    </main>

    <script>
        /**
         * RPRTX Core Engine Refactored
         */
        
        const Engine = {
            init() {
                this.initLenis();
                this.initHorizontalScroll();
                this.handleResize();
            },

            initLenis() {
                this.lenis = new Lenis({
                    duration: 1.4,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                    smoothWheel: true
                });

                // Sync Lenis with GSAP Ticker
                this.lenis.on('scroll', ScrollTrigger.update);
                gsap.ticker.add((time) => {
                    this.lenis.raf(time * 1000);
                });
                gsap.ticker.lagSmoothing(0);
            },

            initHorizontalScroll() {
                gsap.registerPlugin(ScrollTrigger);
                
                const wrapper = document.querySelector(".horizontal-wrapper");
                const panels = gsap.utils.toArray(".panel");

                gsap.to(panels, {
                    xPercent: -100 * (panels.length - 1),
                    ease: "none",
                    scrollTrigger: {
                        trigger: "#main-scroller",
                        pin: true,
                        scrub: 1, // Smoothness level
                        snap: 1 / (panels.length - 1),
                        start: "top top",
                        // Dynamic end calculation
                        end: () => `+=${wrapper.offsetWidth}`,
                        invalidateOnRefresh: true
                    }
                });
            },

            handleResize() {
                window.addEventListener("resize", () => {
                    ScrollTrigger.refresh();
                });
            }
        };

        // Boot system
        document.addEventListener("DOMContentLoaded", () => Engine.init());
    </script>
</body>
</html>
