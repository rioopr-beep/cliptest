<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rprtx — Archive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>

    <style>
        :root { --bg: #050505; --indigo: #6366f1; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Cursor */
        .cursor { position: fixed; width: 8px; height: 8px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 9999; mix-blend-difference: difference; }
        .cursor-f { position: fixed; width: 24px; height: 24px; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: none; z-index: 9998; transition: transform 0.1s; }

        /* Menu ••• */
        .dot-trigger { position: fixed; top: 35px; right: 45px; z-index: 1000; font-size: 24px; letter-spacing: 2px; transition: 0.3s; }
        .dot-trigger:hover { color: var(--indigo); letter-spacing: 6px; }

        .nav-overlay { position: fixed; inset: 0; background: rgba(5,5,5,0.98); backdrop-filter: blur(15px); z-index: 999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.5s; }
        .nav-overlay.active { opacity: 1; pointer-events: all; }
        .nav-link { font-size: 8vw; font-weight: 900; text-transform: uppercase; text-decoration: none; color: #fff; transition: 0.4s; }
        .nav-link:hover { color: var(--indigo); transform: skewX(-10deg); }

        /* Scroll Layout */
        .scroll-container { display: flex; flex-wrap: nowrap; width: 500vw; height: 100vh; }
        .panel { flex-shrink: 0; width: 100vw; height: 100vh; display: flex; align-items: center; padding: 0 8vw; border-right: 1px solid rgba(255,255,255,0.05); }
        .panel-title { font-size: 14vw; font-weight: 900; text-transform: uppercase; white-space: nowrap; line-height: 1; letter-spacing: -0.05em; }
        
        .char { display: inline-block; transform: translateY(100%); opacity: 0; }
        .outline { -webkit-text-stroke: 1px rgba(255,255,255,0.2); color: transparent; }
    </style>
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-f"></div>

    <div class="dot-trigger" onclick="toggleMenu()">•••</div>
    <nav class="nav-overlay">
        <a href="about.html" class="nav-link">About</a>
    </nav>

    <main class="scroll-container">
        <section class="panel"><h1 class="panel-title text-indigo-500 animate">System Init</h1></section>
        <section class="panel bg-[#080808]"><h1 class="panel-title animate">Creative Archive</h1></section>
        <section class="panel"><h1 class="panel-title outline animate">Future Lab</h1></section>
        <section class="panel bg-[#060606]"><h1 class="panel-title animate">Visual Flow</h1></section>
        <section class="panel bg-indigo-600"><h1 class="panel-title text-black animate">Stay Stoic</h1></section>
    </main>

    <script>
        const toggleMenu = () => document.querySelector('.nav-overlay').classList.toggle('active');

        // Cursor
        window.addEventListener("mousemove", (e) => {
            gsap.to(".cursor", { x: e.clientX, y: e.clientY, duration: 0 });
            gsap.to(".cursor-f", { x: e.clientX - 10, y: e.clientY - 10, duration: 0.15 });
        });

        // Scroll
        gsap.registerPlugin(ScrollTrigger);
        const panels = gsap.utils.toArray(".panel");
        const scrollTween = gsap.to(panels, {
            xPercent: -100 * (panels.length - 1),
            ease: "none",
            scrollTrigger: { trigger: ".scroll-container", pin: true, scrub: 1, end: () => "+=" + innerWidth * 5 }
        });

        // Text Animation
        document.querySelectorAll(".animate").forEach(el => {
            new SplitType(el, { types: 'chars' });
            gsap.fromTo(el.querySelectorAll(".char"), { y: 100, opacity: 0 }, {
                y: 0, opacity: 1, stagger: 0.04, scrollTrigger: { trigger: el, containerAnimation: scrollTween, start: "left 85%", toggleActions: "play none none reverse" }
            });
        });

        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
    </script>
</body>
</html>
