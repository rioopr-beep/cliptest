<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rio Pratama</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="typography.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="loader.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

    <div id="loader" class="loader">
        <span class="loader-text">LOADING</span>
    </div>

    <header class="top-left-brand">
        <span class="brand-name">RIO PRATAMA</span>
    </header>

    <nav class="bottom-nav">
        <a href="about.html" class="menu-trigger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </a>
    </nav>

    <div class="horizontal-slider">
        
        <section class="slide">
            <div class="illustration-editor">
                <div class="editor-block"></div>
                <div class="code code-css">
                    <header>
                        <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="6" fill="#FF5F56"/></svg>
                        <h1>CORE.SYS</h1>
                    </header>
                    <div class="code-content">
                        <code>
                            <div class="line-1 c-p">.status {</div>
                            <div class="line-2 c-o">mode: <span class="c-y">"Visionary";</span></div>
                            <div class="line-3 c-p">}</div>
                        </code>
                    </div>
                </div>
            </div>
        </section>

        <section class="slide">
            <div class="text-content">
                <h2 class="reveal-text">DIGITAL</h2>
                <h2 class="reveal-text">CRAFT</h2>
                <p>Membangun ekosistem digital melalui baris kode yang presisi.</p>
            </div>
        </section>

        <section class="slide">
            <div class="text-content">
                <h2 class="reveal-text">GET IN</h2>
                <h2 class="reveal-text">TOUCH</h2>
                <p>Bekerja sama untuk menciptakan solusi arsitektur teknologi.</p>
            </div>
        </section>

    </div>

    <div id="canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="loader.js"></script>
    <script src="effects.js"></script>
</body>
</html>
