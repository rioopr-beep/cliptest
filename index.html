<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rprtx — Creative Archive</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <button class="nav-trigger" onclick="toggleNav()">•••</button>

    <nav class="overlay">
        <a href="#" class="nav-link">About Me</a>
    </nav>

    <main class="scroll-wrapper">
        <div class="scroll-content">
            
            <img src="https://picsum.photos/600/800?random=11" class="floating-photo" style="top: 15%; left: 130vw;">
            <img src="https://picsum.photos/600/800?random=22" class="floating-photo" style="bottom: 10%; left: 260vw;">
            <img src="https://picsum.photos/600/800?random=33" class="floating-photo" style="top: 20%; left: 380vw;">
            <img src="https://picsum.photos/600/800?random=44" class="floating-photo" style="bottom: 15%; left: 450vw;">

            <section class="panel">
                <div class="masking-container">
                    <h1 id="init-text" class="masked-text animate">System Init</h1>
                </div>
            </section>
            
            <section class="panel bg-[#050505]">
                <div class="masking-container">
                    <h1 id="rio-text" class="masked-text animate">RIO PRATAMA</h1>
                </div>
            </section>
            
            <section class="panel">
                <div class="masking-container">
                    <h1 id="future-text" class="masked-text animate">Future Lab</h1>
                </div>
            </section>
            
            <section class="panel bg-[#060606]">
                <div class="masking-container">
                    <h1 id="flow-text" class="masked-text animate">Visual Flow</h1>
                </div>
            </section>
            
            <section class="panel bg-[#080808]">
                <div class="masking-container">
                    <h1 id="stoic-text" class="masked-text animate">Stay Stoic</h1>
                </div>
            </section>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
