<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — rprtx</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>
</head>
<body class="bg-[#050505]">

    <div class="cursor"></div>

    <a href="index.html" class="close-btn">CLOSE</a>

    <main class="about-main">
        <h1 class="falling-title">RPRTX.</h1>
        
        <p class="text-zinc-500 text-xl max-w-xl leading-relaxed mt-8">
            Praktisi digital yang fokus pada kesederhanaan visual dan performa kode. Mengintegrasikan filosofi Stoikisme ke dalam arsitektur sistem dan setiap baris karya untuk mencapai ketenangan fungsional.
        </p>

        <nav class="social-list">
            <a href="https://www.instagram.com/24yoyopr" target="_blank" class="social-item">INSTAGRAM</a>
            <a href="mailto:riokmxl@gmail.com" class="social-item">EMAIL</a>
            <a href="https://linkedin.com" target="_blank" class="social-item">LINKEDIN</a>
        </nav>
    </main>

    <script>
        /**
         * ABOUT PAGE ENGINE
         */
        
        // Inisialisasi Kursor
        const cursor = document.querySelector(".cursor");
        window.addEventListener("mousemove", (e) => {
            gsap.to(cursor, { 
                x: e.clientX, 
                y: e.clientY, 
                duration: 0 
            });
        });

        // Inisialisasi SplitType untuk karakter judul
        const split = new SplitType('.falling-title', { types: 'chars' });

        // Animasi Teks Jatuh (Falling Bounce)
        gsap.fromTo(split.chars, 
            { 
                y: -300, 
                opacity: 0 
            }, 
            { 
                y: 0, 
                opacity: 1, 
                stagger: 0.1, 
                duration: 1.5, 
                ease: "bounce.out" 
            }
        );

        // Animasi Fade-In untuk Deskripsi dan Menu Sosial
        gsap.from("p, .social-item", { 
            opacity: 0, 
            y: 40, 
            stagger: 0.15, 
            duration: 1.2, 
            delay: 1, 
            ease: "power4.out" 
        });

        // Efek Hover Kursor pada Link
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('mouseenter', () => {
                gsap.to(cursor, { scale: 4, duration: 0.3 });
            });
            link.addEventListener('mouseleave', () => {
                gsap.to(cursor, { scale: 1, duration: 0.3 });
            });
        });
    </script>
</body>
</html>
