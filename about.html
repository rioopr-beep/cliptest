<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — rprtx</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>
</head>
<body>

    <div class="cursor"></div>

    <a href="index.html" class="close-btn">CLOSE</a>

    <main class="about-main">
        <h1 class="falling-title">RPRTX.</h1>
        
        <p class="text-zinc-500 text-xl max-w-xl leading-relaxed mt-8">
            Praktisi digital yang fokus pada kesederhanaan visual dan performa kode. Mengintegrasikan filosofi Stoikisme ke dalam arsitektur sistem dan setiap baris karya.
        </p>

        <nav class="social-list">
            <a href="https://www.instagram.com/24yoyopr" target="_blank" class="social-item">INSTAGRAM</a>
            <a href="mailto:riokmxl@gmail.com" class="social-item">EMAIL</a>
            <a href="https://linkedin.com" target="_blank" class="social-item">LINKEDIN</a>
        </nav>
    </main>

    <script>
        /**
         * ABOUT PAGE ENGINE
         */
        
        // Logika Kursor
        window.addEventListener("mousemove", (e) => {
            gsap.to(".cursor", { x: e.clientX, y: e.clientY, duration: 0 });
        });

        // Inisialisasi SplitType untuk animasi per karakter
        const split = new SplitType('.falling-title', { types: 'chars' });

        // Animasi Teks Jatuh (Falling Bounce)
        gsap.fromTo(split.chars, 
            { 
                y: -200, 
                opacity: 0 
            }, 
            { 
                y: 0, 
                opacity: 1, 
                stagger: 0.08, 
                duration: 1.2, 
                ease: "bounce.out" 
            }
        );

        // Animasi Muncul Halus untuk Deskripsi dan Link
        gsap.from("p, .social-item", { 
            opacity: 0, 
            y: 30, 
            stagger: 0.1, 
            duration: 1, 
            delay: 0.8, 
            ease: "power4.out" 
        });
    </script>
</body>
</html>
