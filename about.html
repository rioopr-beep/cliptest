<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — rprtx</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root { 
            --bg: #050505; 
            --indigo: #6366f1; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* Custom Cursor */
        .cursor { 
            position: fixed; width: 8px; height: 8px; background: #fff; 
            border-radius: 50%; pointer-events: none; z-index: 9999; 
            mix-blend-difference: difference; 
        }

        /* Layout */
        main {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 0 10%;
        }

        .title {
            font-size: clamp(4rem, 12vw, 10rem);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.8;
            letter-spacing: -0.05em;
            color: var(--indigo);
            margin-bottom: 2rem;
        }

        .description {
            max-width: 600px;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-links a {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            width: fit-content;
            padding-bottom: 5px;
        }

        .social-links a:hover {
            color: var(--indigo);
            border-bottom: 1px solid var(--indigo);
            padding-left: 10px;
        }

        .back-btn {
            position: fixed; top: 35px; right: 45px;
            text-decoration: none; color: white;
            font-size: 14px; text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <div class="cursor"></div>

    <a href="index.html" class="back-btn">Back •</a>

    <main>
        <h1 class="title">ABOUT.</h1>
        
        <p class="description">
            Seorang praktisi digital yang fokus pada pengembangan sistem kreatif dan estetika minimalis. Menggabungkan kode presisi dengan filosofi ketenangan dalam setiap karya.
        </p>

        <div class="social-links">
            <a href="https://www.instagram.com/@24yoyopr" target="_blank">Instagram</a>
            <a href="mailto:riokmxl@gmail.com">Email</a>
            <a href="https://linkedin.com" target="_blank">LinkedIn</a>
        </div>
    </main>

    <script>
        // Simple Cursor Logic
        const c = document.querySelector(".cursor");
        window.addEventListener("mousemove", (e) => {
            gsap.to(c, { x: e.clientX, y: e.clientY, duration: 0 });
        });

        // Basic Entry Animation
        window.onload = () => {
            gsap.from(".title", { opacity: 0, y: 50, duration: 1, ease: "power4.out" });
            gsap.from(".description", { opacity: 0, y: 30, duration: 1, delay: 0.3, ease: "power4.out" });
            gsap.from(".social-links a", { opacity: 0, x: -30, stagger: 0.1, duration: 0.8, delay: 0.6, ease: "power4.out" });
        }
    </script>
</body>
</html>
